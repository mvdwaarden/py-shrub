---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-conf
  labels:
    app: otel-collector
data:
  config.yaml: |
    receivers:
      # 1. Your existing container log scraper
      filelog:
        include:
          - /var/log/pods/*/*/*.log
        exclude:
          - /var/log/pods/*_otel-collector-*/*/*.log
        start_at: end
        operators:
          - type: regex_parser
            regex: '^(?P<time>[^ Z]+Z)\s+(?P<stream>stdout|stderr)\s+(?P<logtag>[^ ]*)\s+(?P<log>.*)$'
            timestamp:
              parse_from: attributes.time
              layout: '%Y-%m-%dT%H:%M:%S.%LZ'
          - type: move
            from: attributes.log
            to: body

      # 2. ADD THIS: The network catcher for the injected OTel SDK data
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317   # Listens for high-performance traces/metrics
          http:
            endpoint: 0.0.0.0:4318   # Listens for standard web-protocol traffic

    processors:
      batch: {}

    exporters:
      debug:
        verbosity: detailed # Keep this detailed to see all the new structural data in stdout

    service:
      pipelines:
        # Your existing log pipeline, now accepting both raw log files AND native OTel logs
        logs:
          receivers: [filelog, otlp]
          processors: [batch]
          exporters: [debug]

        # ADD THIS: A dedicated pipeline to handle the RamaLama tracing data
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [debug]

        # ADD THIS: A dedicated pipeline to handle the performance metrics
        metrics:
          receivers: [otlp]
          processors: [batch]
          exporters: [debug]

---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: otel-collector
  labels:
    app: otel-collector
spec:
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      containers:
        - name: otel-collector
          # We MUST use the "contrib" image because the core image does not include the filelog receiver
          image: docker.io/otel/opentelemetry-collector-contrib:latest
          args:
            - "--config=/etc/otelcol-contrib/config.yaml"
          volumeMounts:
            # Mount the host's log directories so the collector can read them
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
            - name: config-volume
              mountPath: /etc/otelcol-contrib
      volumes:
        - name: varlog
          hostPath:
            path: /var/log
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers
        - name: config-volume
          configMap:
            name: otel-collector-conf
