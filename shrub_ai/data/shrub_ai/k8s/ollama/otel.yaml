---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-conf
  labels:
    app: otel-collector
data:
  config.yaml: |
    receivers:
      filelog:
        include:
          - /var/log/pods/*/*/*.log
        exclude:
          - /var/log/pods/*_otel-collector-*/*/*.log
        start_at: end
        # --- ADD THESE OPERATORS TO PARSE THE LOGS ---
        operators:
          # This regex parses standard CRI-O/containerd log formats
          - type: regex_parser
            regex: '^(?P<time>[^ Z]+Z)\s+(?P<stream>stdout|stderr)\s+(?P<logtag>[^ ]*)\s+(?P<log>.*)$'
            timestamp:
              parse_from: attributes.time
              layout: '%Y-%m-%dT%H:%M:%S.%LZ'
          # This operator moves the clean log message back into the main Body
          - type: move
            from: attributes.log
            to: body
    processors:
      batch: {} # Batches logs before sending them

    exporters:
      debug:
        verbosity: detailed # Prints the captured logs to stdout

    service:
      pipelines:
        logs:
          receivers: [filelog]
          processors: [batch]
          exporters: [debug]

---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: otel-collector
  labels:
    app: otel-collector
spec:
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      containers:
        - name: otel-collector
          # We MUST use the "contrib" image because the core image does not include the filelog receiver
          image: docker.io/otel/opentelemetry-collector-contrib:latest
          args:
            - "--config=/etc/otelcol-contrib/config.yaml"
          volumeMounts:
            # Mount the host's log directories so the collector can read them
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
            - name: config-volume
              mountPath: /etc/otelcol-contrib
      volumes:
        - name: varlog
          hostPath:
            path: /var/log
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers
        - name: config-volume
          configMap:
            name: otel-collector-conf
