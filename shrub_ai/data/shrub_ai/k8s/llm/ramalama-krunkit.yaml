# ─── 1. THE INSTRUMENTATION CRD ───
# This must exist in the namespace FIRST so the webhook knows where to route data
# apiVersion: opentelemetry.io/v1alpha1
# kind: Instrumentation
# metadata:
#   name: ramalama-autoinstrumentation
#   namespace: default
# spec:
#   exporter:
#     # Routes telemetry straight to your OTel Collector Service
#     endpoint: http://otel-collector.observability.svc.cluster.local:4317 
#   python:
#     env:
#       - name: OTEL_METRICS_EXPORTER
#         value: "otlp"
#       - name: OTEL_LOGS_EXPORTER
#         value: "otlp"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ramalama-deployment
  namespace: default
  labels:
    app: ramalama
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ramalama
  template:
    metadata:
      annotations:
        instrumentation.opentelemetry.io/inject-python: "true"
      labels:
        app: ramalama
    spec:
      containers:
      - name: llama-engine
        # Specialized image containing the virtio-gpu / Metal translation layers
        image: quay.io/ramalama/ramalama:latest
        #imagePullPolicy: Never # Forces the use of your pre-cached local Podman image
        command: [
          "llama-server",
          "--host", "0.0.0.0",
          "--port", "8081",
          #"--metrics", 
          # Points directly to the Mac folder passed through by minikube --mount-string
          "--model", "/mnt/models/qwen2.5-vl-7b-instruct-q4_K_M.gguf", 
          "--mmproj", "/mnt/models/Qwen2.5-VL-7B-Instruct-F16.gguf", 
          "-ngl", "999", # Shunts all layers directly to your Mac's GPU cores
          "--threads", "6"
        ]
        env:
          - name: LLAMA_ARG_ENDPOINT_METRICS
            value: "true"
          - name: LLAMA_ARG_METRICS
            value: "true"
        ports:
        - containerPort: 8081
          name: ramalama-port
        resources:
          limits:
            # Tells the cluster plugin to hook this pod onto the virtualized Mac GPU layer
            devic.es/virtio-gpu: "1"
        volumeMounts:
        - name: mac-models-dir
          mountPath: /mnt/models
      volumes:
      - name: mac-models-dir
        hostPath:
          path: /mnt/models # Reads directly from the Minikube Linux node's mount path
---
apiVersion: v1
kind: Service
metadata:
  name: ramalama-service
  namespace: default
spec:
  type: ClusterIP
  ports:
  - port: 8081
    targetPort: 8081
    protocol: TCP
  selector:
    app: ramalama