apiVersion: v1
kind: Namespace
metadata:
  name: observability
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: observability # Make sure this matches the namespace of your collector pod
spec:
  selector:
    # CRITICAL: This must exactly match the labels on your OTel Collector pod
    app: otel-collector 
  ports:
    - name: otlp-grpc
      protocol: TCP
      port: 4317
      targetPort: 4317
    - name: otlp-http
      protocol: TCP
      port: 4318
      targetPort: 4318
    - name: prometheus
      protocol: TCP
      port: 8889
      targetPort: 8889
  type: ClusterIP # Standard internal cluster networking
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-conf
  namespace: observability # Make sure this matches the namespace of your collector pod
  labels:
    app: otel-collector
data:
  config.yaml: |
    receivers:
      filelog:
        include: [/var/log/pods/*/*/*.log]
        exclude: [/var/log/pods/*_otel-collector-*/*/*.log]
        include_file_path: true
        start_at: end
        operators:
          - type: container
            id: container-parser
      otlp:
        protocols:
          grpc: { endpoint: 0.0.0.0:4317 }
          http: { endpoint: 0.0.0.0:4318 }
      prometheus/ramalama:
        config:
          scrape_configs:
            - job_name: 'llama-server'
              scrape_interval: 10s
              metrics_path: '/metrics' # llama-server serves Prometheus metrics here natively
              static_configs:
                - targets: ['ramalama-service.default.svc.cluster.local:8081']
    processors:
      batch: {}

    # ─── ADD THESE EXPORTERS TO SHIP DATA OUT ───
    exporters:
      debug:
        verbosity: detailed # Re-adding this so you have somewhere valid to send logs
      prometheus:
        endpoint: "0.0.0.0:8889"
      otlp/jaeger:
        endpoint: "host.minikube.internal:4317" 
        tls:
          insecure: true

    service:
      pipelines:
        logs:
          receivers: [filelog, otlp]
          processors: [batch]
          exporters: [debug] # Logs metrics can be read by Prometheus
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [otlp/jaeger] # Traces go straight to Jaeger
        metrics:
          receivers: [otlp, prometheus/ramalama]
          processors: [batch]
          exporters: [prometheus] # App metrics go to Prometheus

---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: otel-collector
  namespace: observability # Make sure this matches the namespace of your collector pod
  labels:
    app: otel-collector
spec:
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      containers:
        - name: otel-collector
          # We MUST use the "contrib" image because the core image does not include the filelog receiver
          image: docker.io/otel/opentelemetry-collector-contrib:latest
          args:
            - "--config=/etc/otelcol-contrib/config.yaml"
          ports:
            - name: prometheus
              containerPort: 8889
              protocol: TCP
            - name: otlp-grpc
              containerPort: 4317
              protocol: TCP
            - name: otlp-http
              containerPort: 4318
              protocol: TCP
          volumeMounts:
            # Mount the host's log directories so the collector can read them
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
            - name: config-volume
              mountPath: /etc/otelcol-contrib
      volumes:
        - name: varlog
          hostPath:
            path: /var/log
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers
        - name: config-volume
          configMap:
            name: otel-collector-conf
